version: "3.8"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./Model:/app/Model
    env_file:
      - .env
    depends_on:
      - db
      - mlflow

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: creditguard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mlflow:
    image: ghcr.io/mlflow/mlflow
    ports:
      - "5000:5000"
    command: >
      mlflow server 
      --host 0.0.0.0
      --backend-store-uri /mlflow/mlruns
      --default-artifact-root /mlflow/artifacts
      --allowed-hosts mlflow:5000,localhost:5000,127.0.0.1:5000
    volumes:
      - mlflow_data:/mlflow

volumes:
  postgres_data:
  mlflow_data: